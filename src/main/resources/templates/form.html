<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Form</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            background-color: #f8fafc;
            color: #334155;
        }

        nav {
            background-color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .brand {
            font-weight: bold;
            color: #2563eb;
        }

        .nav-links a {
            text-decoration: none;
            color: #64748b;
            margin-left: 1.5rem;
            font-size: 0.9rem;
        }

        .container {
            max-width: 500px;
            margin: 3rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        h2 {
            margin-top: 0;
            color: #1e293b;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        input,
        select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <nav>
        <div class="brand"></div>
        <div class="nav-links">
            <a href="/home">Home</a>
            <a href="/form">Form</a>
            <a href="/list">Daftar Data</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Input Data</h2>
        <form th:action="@{/result}" method="post">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" name="nama" placeholder="Masukkan nama" required>
            </div>
            <div class="form-group">
                <label>NIM</label>
                <input type="text" name="nim" placeholder="Masukkan NIM" required>
            </div>
            <div class="form-group">
                <label>Jenis Kelamin</label>
                <select name="jenisKelamin" required>
                    <option value="" disabled selected>Pilih -</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Kirim Data</button>
        </form>
    </div>
</body>

</html>
